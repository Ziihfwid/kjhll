;----Aim Assist v4.00 v1----
#Persistent
#KeyHistory, 0
#NoEnv
#HotKeyInterval 1
#MaxHotkeysPerInterval 127
#InstallKeybdHook
#UseHook
#SingleInstance, Force
SetKeyDelay,-0 8
SetControlDelay, -1
SetMouseDelay, -1
SetWinDelay,-1
SendMode, InputThenPlay
SetBatchLines,-1
ListLines, Off
CoordMode, Pixel, Screen, RGB
CoordMode, Mouse, Screen
PID := DllCall("GetCurrentProcessId")
Process, Priority, %PID%, Normal

ColVn := 0
ZeroX := 960
ZeroY := 540
CFovX := 155  ; square research in width
CFovY := 155  ; square research in height
ScanL := ZeroX - CFovX
ScanT := ZeroY - CFovY
ScanR := ZeroX + CFovX
ScanB := ZeroY + CFovY

; Counter-Terrorists
F4::
Loop {
    GetKeyState, Mouse2, LButton, P
    PixelSearch, AimPixelX, AimPixelY, ScanL, ScanT, ScanR, ScanB, 0x5B563B, ColVn, Fast RGB
    if errorlevel = 0
    {
        GoSub GetAimOffset
        GoSub GetAimMoves2
        GoSub MouseMoves
        GoSub AntiShake
    }
}

GetAimMoves2:
RootX := Floor((AimPixelX - A_ScreenWidth/2 + 95) * 0.015)
x := RootX * DirX
Return

; Terrorist
F3::
Loop {
    GetKeyState, Mouse2, LButton, P
    PixelSearch, AimPixelX, AimPixelY, ScanL, ScanT, ScanR, ScanB, 0x644325, ColVn, Fast RGB
    if errorlevel != 0
        PixelSearch, AimPixelX, AimPixelY, ScanL, ScanT, ScanR, ScanB, 0x3B2614, ColVn, Fast RGB
    if errorlevel != 0
        PixelSearch, AimPixelX, AimPixelY, ScanL, ScanT, ScanR, ScanB, 0x3E2113, ColVn, Fast RGB
    if errorlevel != 0
        PixelSearch, AimPixelX, AimPixelY, ScanL, ScanT, ScanR, ScanB, 0x5C4B2C, ColVn, Fast RGB

    if errorlevel = 0
    {
        GoSub GetAimOffset
        GoSub GetAimMoves
        GoSub MouseMoves
        GoSub AntiShake
    }
}

GetAimOffset:
AimX := AimPixelX - ZeroX
If (AimX > 0) {
    DirX := 1
}
If (AimX < 0) {
    DirX := -1
}
If (AimY > 0) {
    DirY := 0
}
If (AimY < 0) {
    DirY := 0
}
AimOffsetX := AimX * DirX
Return

GetAimMoves:
RootX := Floor((AimPixelX - A_ScreenWidth/2 + 95) * 0.015)
x := RootX * DirX
Return

AntiShake:
Abs(AimPixelX - A_ScreenWidth/2 + 11) > 60
Return

MouseMoves:
If (Mouse2 == "D") {
    DllCall("mouse_event", "UInt", 0x01, "Int", x, "Int", 0)
}
Return

INS:: Reload
